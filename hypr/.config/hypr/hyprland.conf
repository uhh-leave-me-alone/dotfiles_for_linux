autogenerated = 0

################
### MONITORS ###
################

monitor = ,2560x1440@144,auto,1


###################
### MY PROGRAMS ###
###################

$terminal   = foot
$fileManager = foot -e yazi
$menu       = rofi -show drun


#WALLPAPERS (suggested to stay before autostart section)
exec-once = hyprpaper
exec-once = ~/.config/hypr/wallpaper.sh

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = mako
exec-once = nm-applet
exec-once = lxpolkit
exec-once = blueman-applet

exec-once = sleep 2 && hyprctl dispatch movecursor 9999 9999 #баг NVIDIA с буфером GPU. Курсор застревает в позиции от GDM
exec-once = sleep 3 && hyprctl dispatch movecursor 1 1

#############################
### ENVIRONMENT VARIABLES ###
#############################

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = WLR_NO_HARDWARE_CURSORS,1


# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,default

# Toolkit backends
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland


#####################
### LOOK AND FEEL ###
#####################

group {
    col.border_active = rgba(f38ba8ff)
    col.border_inactive = rgba(313244ff)
    #groupbar {
    #    render_titles = true
    #    font_size = 16
    #    col.locked_active = rgba(313244ff)
    #    col.locked_inactive = rgba(1e1e2eff)
    #    col.active = rgba(a6e3a1ff)
    #    text_color = rgba(1e1e2eff)
    #    col.inactive = rgba(1e1e2eff)
    #    keep_upper_gap=false
    #    transparency = 1
    #}

    groupbar {
    height = 4
    font_size = 15
    text_offset = -11
    indicator_height = 18
    col.active = rgba(a6e3a1ff)
    col.inactive = rgba(f38ba8ff)
    text_color = rgba(1e1e2eff)
    render_titles = true
    gradients = false
}
}

general {
    gaps_in  = 2 #gaps between windows 
    gaps_out = 0 #gaps from the edge of the screen

    border_size = 10

    # Catppuccin Mocha
    #col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg #Decided to get rid of gradient because it is hard to understand what is the color: pink or violet, and the grouping mode is pink, so not quite handy...
    col.active_border = rgba(cba6f7ff)
    col.inactive_border = rgba(313244aa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 0 # скругление углов окон I decided to turn off
    rounding_power = 0 # плавность скругления

    active_opacity   = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(1e1e2ecc)
        offset       = 0 5
    }

    blur {
        enabled          = true
        size             = 8
        passes           = 3
        new_optimizations = true
        xray             = false
        noise            = 0.02
        contrast         = 1.1
        brightness       = 1.0
        vibrancy         = 0.2
        vibrancy_darkness = 0.5
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1 #these are bezier curves. The are for animation speed 
    bezier = easeOutBack,    0.34, 1.56, 0.64, 1 #four points of animation: start, acceleration, middle, end
    bezier = linear,         0,    0,    1,    1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = windows,       1, 2,   easeOutBack,    slide
    animation = windowsIn,     1, 2,   easeOutBack,    popin 80%
    animation = windowsOut,    1, 2,   easeInOutCubic, popin 80%
    animation = border,        1, 4,   easeOutQuint
    animation = borderangle,   1, 30,  linear,         loop
    animation = fade,          1, 4,   easeOutQuint
    animation = workspaces,    0, 5,   easeOutQuint,   slide #fuck workspaces animations
    animation = specialWorkspace, 1, 2, easeOutBack,   slidevert
    animation = layers,        1, 2,   easeOutQuint
}

dwindle {
    pseudotile     = true
    #preserve_split = true
    #smart_split    = true
    smart_resizing = true
}

master {
    new_status        = slave
    new_on_top        = false
    mfact             = 0.55
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    animate_manual_resizes   = false
    #animate_mouse_windowdrag = true
    enable_swallow           = true #при запуске из терминала прячет терминал и выводит окно. При закрытии возвращает
    swallow_regex            = ^(foot)$ # Те, кто умеет глотать (смотри строку вверх)
    focus_on_activate        = false #Если мессенджер получил сообщение и мигает, то фокус перейдет на него при true, при false просто загорится border.
}

cursor {
    no_hardware_cursors = 2
    no_warps = true               #nvidia gpu fix for curor duplication and disappear.
    hide_on_key_press = false
    inactive_timeout = 0
}


#############
### INPUT ###
#############

input {
    kb_layout  = us,ru
    kb_options = grp:alt_shift_toggle

    follow_mouse    = 1
    sensitivity     = 0
    numlock_by_default = true #turns on numlock when the system starts

    touchpad {
        natural_scroll    = true
        disable_while_typing = true
        tap-to-click      = false #one tap equals mouse click
        scroll_factor     = 0.8 #speed of two finger scrolling
    }
}



###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Основные
bind  = $mainMod,       Return,      exec, $terminal
bind  = $mainMod SHIFT, Return,      exec, kitty
bind  = $mainMod,       D,           exec, $menu
bind  = $mainMod,       E,           exec, $fileManager
bind  = $mainMod      , Q,           killactive
bind  = $mainMod SHIFT, Q,           exec, ~/.config/hypr/kill-focused.sh
bind  = $mainMod SHIFT, E,           exit
bind  = $mainMod SHIFT, I,           exec, hyprlock
bind  = $mainMod,       V,           togglefloating
bind  = $mainMod,       F,           fullscreen, 0
bind  = $mainMod SHIFT, F,           fullscreen, 1

# Скриншот
bind  = $mainMod SHIFT, P,           exec, grim -g "$(slurp)" - | tee ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png | wl-copy && notify-send -e "Screenshot captured!" -t 4000

# Навигация фокуса
bind  = $mainMod,       H,           movefocus, l
bind  = $mainMod,       L,           movefocus, r
bind  = $mainMod,       K,           movefocus, u
bind  = $mainMod,       J,           movefocus, d
bind  = $mainMod,       left,        movefocus, l
bind  = $mainMod,       right,       movefocus, r
bind  = $mainMod,       up,          movefocus, u
bind  = $mainMod,       down,        movefocus, d

# Перемещение окон
bind  = $mainMod SHIFT, H,           movewindoworgroup, l
bind  = $mainMod SHIFT, L,           movewindoworgroup, r
bind  = $mainMod SHIFT, K,           movewindoworgroup, u
bind  = $mainMod SHIFT, J,           movewindoworgroup, d

# Tab mode 
bind = $mainMod, G,       togglegroup
bind = $mainMod, semicolon, changegroupactive, f
bind = $mainMod, comma,     changegroupactive, b

# Изменение размера окон
binde = $mainMod CTRL,  H,           resizeactive, -30 0
binde = $mainMod CTRL,  L,           resizeactive, 30 0
binde = $mainMod CTRL,  K,           resizeactive, 0 -30
binde = $mainMod CTRL,  J,           resizeactive, 0 30

# Воркспейсы
bind  = $mainMod,       1,           workspace, 1
bind  = $mainMod,       2,           workspace, 2
bind  = $mainMod,       3,           workspace, 3
bind  = $mainMod,       4,           workspace, 4
bind  = $mainMod,       5,           workspace, 5
bind  = $mainMod,       6,           workspace, 6
bind  = $mainMod,       7,           workspace, 7
bind  = $mainMod,       8,           workspace, 8
bind  = $mainMod,       9,           workspace, 9
bind  = $mainMod,       0,           workspace, 10

# Переместить окно на воркспейс (без перехода)
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Переместить окно на воркспейс с переходом
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind  = $mainMod,       S,           togglespecialworkspace, magic
bind  = $mainMod SHIFT, S,           movetoworkspacesilent, special:magic
bind  = $mainMod CTRL, S,           movetoworkspace, special:magic

# Прокрутка воркспейсов
bind  = $mainMod,       mouse_down,  workspace, e+1
bind  = $mainMod,       mouse_up,    workspace, e-1
bind  = $mainMod,       Tab,         workspace, e+1
bind  = $mainMod SHIFT, Tab,         workspace, e-1

# Перемещение и ресайз мышью
bindm = $mainMod,       mouse:272,   movewindoworgroup
bindm = $mainMod,       mouse:273,   resizewindow

# Wallpaper switcher
bind  = $mainMod SHIFT, W, exec, ~/.config/hypr/wallpaper.sh

# Медиаклавиши

#for laptop

#bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
#bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
#bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
#bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
#bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
#bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
#bindl  = , XF86AudioNext,         exec, playerctl next
#bindl  = , XF86AudioPause,        exec, playerctl play-pause
#bindl  = , XF86AudioPlay,         exec, playerctl play-pause
#bindl  = , XF86AudioPrev,         exec, playerctl previous

#for desktop

bind = $mainMod, F1 ,   exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod, F2 ,   exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mainMod, F3 ,   exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = $mainMod, F9 ,   exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Smart gaps
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1],   gapsout:0, gapsin:0

windowrule {
    name  = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name  = fix-xwayland-drags
    match:class     = ^$
    match:title     = ^$
    match:xwayland  = true
    match:float     = true
    match:fullscreen = false
    no_focus = true
}

# Floating окна
windowrule {
    name  = float-dialogs
    match:class = ^(pavucontrol|nm-connection-editor|blueman-manager)$
    float = true
    size  = 800 600
    center = true
}

windowrule {
    name  = float-rnote
    match:class = ^(rnote)$
    float = true
    size  = 1200 800
    center = true
}

# Прозрачность для некоторых приложений
#windowrule {
#    name  = opacity-foot
#    match:class = ^(foot)$
#    opacity = 1.00 0.99999
#}

decoration {
    blur {
        enabled = true
        ignore_opacity = false
    }
}


